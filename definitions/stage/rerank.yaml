# $schema: ../../schemas/operator.json
name: $rerank
link: https://www.mongodb.com/docs/vector-search/query/aggregation-stages/rerank/
minVersion: '8.3'
type:
  - stage
encode: object
description: |
  Reranks documents in the aggregation pipeline using a Voyage AI reranking model to improve
  relevance scoring. $rerank invokes the Voyage AI reranking API to score and reorder documents
  based on semantic similarity to a query.
  NOTE: $rerank is only available for MongoDB Atlas clusters, and is not available for self-managed deployments.
arguments:
  - name: model
    type:
      - string
    description: |
      Name of the Voyage AI reranking model to use (e.g. "rerank-2.5", "rerank-2.5-lite").
  - name: query
    type:
      - object
    description: |
      Object that specifies the query to use when scoring document relevance.
    arguments:
      - name: text
        type:
          - string
        description: |
          The query text used to score document relevance against the specified path fields.
  - name: path
    type:
      - string
    variadic: array
    variadicMin: 1
    description: |
      Field path or array of field paths whose text content is sent to the Voyage AI reranking
      model for relevance scoring. Each specified field must contain string values.
  - name: numDocsToRerank
    optional: true
    type:
      - int
    description: |
      Maximum number of documents to send to the Voyage AI reranking model. Value must be
      between 1 and 1000. If omitted, all documents in the pipeline are sent for reranking.
      Defaults to all documents up to the Voyage AI API limit.
tests:
  - name: Rerank by text relevance
    link: https://www.mongodb.com/docs/vector-search/query/aggregation-stages/rerank/#examples
    pipeline:
      - $match:
          plot:
            $exists: true
            $type:
              - string
      - $sort:
          released: -1
      - $rerank:
          model: rerank-2.5
          query:
            text: a group of heroes band together to stop a powerful enemy and save the world
          numDocsToRerank: 100
          path:
            - title
            - plot
      - $addFields:
          rerankScore:
            $meta: score
      - $limit: 10
      - $project:
          _id: 0
          title: 1
          plot: 1
          rerankScore: 1
  - name: Rerank after vector search
    link: https://www.mongodb.com/docs/vector-search/query/aggregation-stages/rerank/#examples
    pipeline:
      - $vectorSearch:
          index: vector_index
          path: plot_embedding
          queryVector:
            - -0.0016261312
            - -0.028070757
            - -0.011342932
          numCandidates: 150
          limit: 50
      - $rerank:
          model: rerank-2.5
          query:
            text: a group of heroes band together to stop a powerful enemy and save the world
          path:
            - title
            - plot
          numDocsToRerank: 50
      - $limit: 10
      - $project:
          _id: 0
          title: 1
          plot: 1
          score:
            $meta: score
